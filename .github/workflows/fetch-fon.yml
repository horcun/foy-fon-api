name: TEFAS Fon Fiyatları

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  fetch-fon-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kutuphane kur
        run: pip install requests

      - name: TEFAS fon fiyatlarini cek
        run: python fetch_fon.py

      - name: Degisiklikleri kaydet
        run: |
          git config --global user.email "foy-bot@foy.app"
          git config --global user.name "FOY Bot"
          git add funds.json
          git diff --staged --quiet || git commit -m "Fon fiyatlari guncellendi"
          git push
