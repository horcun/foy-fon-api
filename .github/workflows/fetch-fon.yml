name: fetch-fon
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install curl_cffi
       - run: python fetch_fon.py
      - run: |
          git config --global user.email "bot@foy.app"
          git config --global user.name "bot"
          git add funds.json
          git diff --staged --quiet || git commit -m "update"
          git push
     
